# AxumRouter Backend — Example Config
# Copy to config/config.toml and fill in your values.
# All values can be overridden via env vars with AXUM_ prefix.
# Example: AXUM_DATABASE__URL=sqlite:data/prod.db?mode=rwc

[server]
host = "0.0.0.0"
port = 3000
# public_url = "http://your-vps-ip:3000"   # Optional: override auto-detected URL

[gateway]
timeout_secs = 120

[auth]
api_key_header = "Authorization"
api_key_prefix = "Bearer "
# admin_password = "your-admin-password"   # Set untuk enable admin login
# jwt_secret = "your-jwt-secret-change-me" # Optional, fallback ke default dev

[database]
url = "sqlite:data/axumrouter.db?mode=rwc"
